<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E36A6A">
  <title>You're Offline — Nexus Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #FFFBF1 0%, #FFF2D0 50%, #FFE8E8 100%);
      color: #1a1a1a;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(227, 106, 106, 0.2);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(227, 106, 106, 0.1), 0 4px 16px rgba(0,0,0,0.06);
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: #E36A6A;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #1a1a1a;
    }

    .wifi-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.95); opacity: 0.7; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .highlight {
      color: #E36A6A;
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #E36A6A;
      color: #fff;
      border: none;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(227, 106, 106, 0.35);
    }

    .btn:hover {
      background: #d45a5a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(227, 106, 106, 0.45);
    }

    .btn:active { transform: translateY(0); }

    .tip {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      margin-right: 6px;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">NEXUS</span>
    </div>

    <span class="wifi-icon">📡</span>

    <h1>You're Offline</h1>
    <p>
      No internet connection detected. Don't worry — once you're back online, your
      <span class="highlight">courses, progress and exam history</span> will sync automatically.
    </p>

    <button class="btn" onclick="window.location.reload()">
      ↻ &nbsp;Retry Connection
    </button>

    <p class="tip">
      <span class="status-dot"></span>
      Waiting for connection to restore...
    </p>
  </div>

  <script>
    // Auto-reload when connection restores
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
