version: "3.9"

services:
  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: examtest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bps}
      POSTGRES_DB: ${POSTGRES_DB:-examtest_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"        # expose only if you need direct DB access from host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-examtest_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - examtest_net

  # ──────────────────────────────────────────
  # Backend — Node.js / Express / Prisma
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examtest_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-bps}@db:5432/${POSTGRES_DB:-examtest_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeythatshouldbechanged}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshkeythatshouldbechanged}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_12345678}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-your_razorpay_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    expose:
      - "5000"             # only visible inside Docker network
    networks:
      - examtest_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────
  # Frontend — React / Vite built → Nginx
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examtest_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"            # public-facing port
    networks:
      - examtest_net

# ──────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ──────────────────────────────────────────
# Shared network
# ──────────────────────────────────────────
networks:
  examtest_net:
    driver: bridge
